<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IAL Past Paper Tracker</title>
  <meta name="description" content="Free tool to track your Edexcel IAL past paper progress across Mathematics, Physics, Chemistry and Biology. Log in to sync your progress across all devices." />
  <meta name="keywords" content="IAL past papers, Edexcel IAL, A Level tracker, past paper progress, Mathematics, Physics, Chemistry, Biology" />
  <meta name="author" content="Tech-Hero7985" />
  <link rel="canonical" href="https://wadhwanimedia.me/" />
  <meta property="og:title" content="IAL Past Paper Tracker" />
  <meta property="og:description" content="Track your Edexcel IAL past paper progress. Free, fast, synced across devices." />
  <meta property="og:url" content="https://wadhwanimedia.me/" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="IAL Past Paper Tracker" />
  <meta name="twitter:description" content="Track your Edexcel IAL past paper progress. Free, fast, synced across devices." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── Auth Modal ─────────────────────────────────────────────────────── -->
  <div id="auth-overlay" class="auth-overlay">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-mark">◈</span>
        <span class="logo-text">IAL Tracker</span>
      </div>
      <p class="auth-sub">Sign in to sync your progress across all devices</p>
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Log In</button>
        <button class="auth-tab" data-tab="signup">Sign Up</button>
      </div>
      <div id="auth-error"   class="auth-msg auth-msg--error"   style="display:none"></div>
      <div id="auth-success" class="auth-msg auth-msg--success" style="display:none"></div>
      <div class="auth-form" id="login-form">
        <div class="auth-field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="auth-field">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <button class="auth-submit" id="login-btn">Log In</button>
      </div>
      <div class="auth-form" id="signup-form" style="display:none">
        <div class="auth-field">
          <label for="signup-name">Display name</label>
          <input type="text" id="signup-name" placeholder="e.g. Ayush" autocomplete="nickname" />
        </div>
        <div class="auth-field">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="auth-field">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" placeholder="At least 6 characters" autocomplete="new-password" />
        </div>
        <button class="auth-submit" id="signup-btn">Create Free Account</button>
      </div>
    </div>
  </div>

  <!-- ── Leaderboard Modal ──────────────────────────────────────────────── -->
  <div id="lb-overlay" class="lb-overlay" style="display:none">
    <div class="lb-card">
      <div class="lb-header">
        <span class="lb-title">🏆 Leaderboard</span>
        <button class="lb-close" id="lb-close">✕</button>
      </div>
      <div class="lb-subtitle">Papers marked Done or Done + Reviewed</div>
      <div id="lb-list" class="lb-list"><div class="lb-loading">Loading…</div></div>
    </div>
  </div>

  <!-- ── Main App ───────────────────────────────────────────────────────── -->
  <div id="app" style="display:none">

    <header class="site-header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-mark">◈</span>
          <span class="logo-text">IAL Tracker</span>
        </div>
        <p class="tagline">Track your past paper progress</p>

        <div class="header-actions">
          <!-- Paper counter -->
          <div class="paper-counter" id="paper-counter" title="Your total papers done across all subjects">
            <span class="paper-counter-icon">📄</span>
            <span class="paper-counter-val" id="paper-counter-val">0</span>
            <span class="paper-counter-label">done</span>
          </div>

          <!-- Leaderboard button -->
          <button class="lb-btn" id="lb-btn" title="Leaderboard">
            🏆 <span class="lb-btn-label">Leaderboard</span>
          </button>

          <!-- Beta testers -->
          <div class="beta-testers">
            <span class="beta-label">Beta Testers</span>
            <div class="beta-avatars">
              <a class="beta-avatar" href="https://www.instagram.com/aaron0_0parker/" target="_blank" rel="noopener" title="@aaron0_0parker" style="--av-color:#f0a500">A</a>
              <a class="beta-avatar" href="https://www.instagram.com/shevvyboy/" target="_blank" rel="noopener" title="@shevvyboy" style="--av-color:#3b7dd8">S</a>
              <a class="beta-avatar" href="https://www.instagram.com/_krish_061208/" target="_blank" rel="noopener" title="@_krish_061208" style="--av-color:#22c97a">K</a>
            </div>
          </div>

          <!-- User pill -->
          <div class="user-pill" id="user-pill">
            <span class="user-avatar" id="user-avatar"></span>
            <span class="user-email" id="user-email"></span>
            <button class="logout-btn" id="logout-btn">Log out</button>
          </div>
        </div>
      </div>
    </header>

    <main class="container">

      <section class="controls-card">
        <div class="controls">
          <div class="field">
            <label for="subject">Subject</label>
            <select id="subject"></select>
          </div>
          <div class="field">
            <label>Years</label>
            <div class="year-picker" id="year-picker">
              <button type="button" class="year-picker-btn" id="year-picker-btn">
                <span id="year-picker-label">Select years</span>
                <svg width="12" height="8" viewBox="0 0 12 8" fill="none"><path d="M1 1l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              </button>
              <div class="year-picker-panel" id="year-picker-panel">
                <div class="year-picker-actions">
                  <button type="button" id="year-pick-all">All</button>
                  <button type="button" id="year-pick-none">None</button>
                </div>
                <div class="year-checklist" id="year-checklist"></div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="paper-picker-card">
        <div class="picker-header">
          <span class="picker-label">Papers to track</span>
          <div class="picker-actions">
            <button type="button" id="pick-all">Select all</button>
            <button type="button" id="pick-none">Clear all</button>
          </div>
        </div>
        <div class="chip-grid" id="chip-grid"></div>
      </section>

      <section id="summary" class="summary" aria-live="polite"></section>
      <section id="tracker" class="tracker"></section>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
